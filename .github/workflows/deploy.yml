name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Container
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Wrangler
        run: npm install -g wrangler@4.73.0

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_ACCESS_AUDIENCE }}" ]; then
            echo "ERROR: CLOUDFLARE_ACCESS_AUDIENCE is missing from GitHub Secrets!"
            exit 1
          else
            echo "CLOUDFLARE_ACCESS_AUDIENCE is present."
          fi

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: '4.73.0'
          command: deploy --var ACCESS_AUDIENCE:${{ secrets.CLOUDFLARE_ACCESS_AUDIENCE }}
